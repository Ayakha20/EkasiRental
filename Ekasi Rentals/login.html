    <main>
        <section id="user-accounts">
        <h1>User Accounts</h1>

        <section id="login">
            <h2>Login</h2>
            <form action="#" method="post">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>

                <label for="login-password">Password:</label>
                <input type="password" id="login-password" name="login-password" placeholder="Enter your password" required>

                <button type="Submit">Login</button>
                <p><a href="#">Forgot your password</a></p>
                <hr></hr>
            </form>
        </section>

        <section id="signup">
            <h2>Sign Up</h2>
            <form>
                <label for="signup-name">Full Name:</label>
                <input type="text" id="signup-name" name="signup-name" placeholder="Enter your full name" required>

                <label for="signup-email">Email:</label>
                <input type="email" id="signup-email" name="signup-email" placeholder="Enter your email" required><br>
                
                <label>Password: </label>
                <input typr="Password" placeholder="Create a password">

                <label for="signup-role">I am a:</label>
                <select id="signup-role" name="signup-role">
                    <option value="tenant">Tenant</option>
                    <option value="landlord">Landlord</option>
                </select>
                <button type="Sumbit">Sign Up</button>
            </form>
        </section>
    </section>
    </main>
